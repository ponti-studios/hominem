description: 'Voice transcript cleanup — filler removal without losing meaning'

providers:
  - id: ollama:chat:gemma4:e2b-mlx
    label: gemma4-e2b-mlx (local)
    config:
      temperature: 0
  - id: openrouter:qwen/qwen3.5-flash-02-23-mini
    label: gpt-4o-mini (current production voice-cleanup default)
    config:
      temperature: 0

prompts:
  - file://prompts/voice-cleanup.json

tests:
  - vars:
      rawText: >-
        um so like i need to uh pick up the the dry cleaning tomorrow and also um call
        john about the uh about the meeting on thursday i think it's at like 3pm or something
      # Encoded as a JSON string, not a YAML list — promptfoo treats a plain
      # YAML-list var as a test-case matrix (one row per element) rather than
      # a single array value. See assertions/voice-cleanup.js for the parse side.
      mustPreserve: '["dry cleaning", "john", "thursday", "3"]'
    assert:
      - type: javascript
        value: file://assertions/voice-cleanup.js

  - vars:
      rawText: 'i i need to call call the the bank about about my account tomorrow'
      mustPreserve: '["bank", "account", "tomorrow"]'
    assert:
      - type: javascript
        value: file://assertions/voice-cleanup.js

  - vars:
      rawText: >-
        remind sarah that the invoice number is uh four five two one and it's due
        on the fifteenth
      mustPreserve: '["sarah", "4521", "fifteenth"]'
    assert:
      - type: javascript
        value: file://assertions/voice-cleanup.js

  - vars:
      # No filler at all — the prompt says "if uncertain, return the original
      # transcript unchanged" and "do not summarize, expand, or paraphrase".
      # A clean transcript should come back essentially as-is, not rewritten.
      rawText: 'Pick up milk and eggs on the way home.'
      mustPreserve: '["milk", "eggs", "way home"]'
    assert:
      - type: javascript
        value: file://assertions/voice-cleanup.js
