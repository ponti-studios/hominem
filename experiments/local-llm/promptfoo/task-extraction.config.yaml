description: "Task extraction from a chat transcript — task discrimination + JSON shape"

providers:
  - id: ollama:chat:gemma4:e2b-mlx
    label: gemma4-e2b-mlx (local)
    config:
      temperature: 0
  - id: openrouter:openai/gpt-4o
    label: gpt-4o (current production default)
    config:
      temperature: 0
  - id: openrouter:google/gemini-2.5-flash-lite
    label: gemini-2.5-flash-lite (current production enhance model)
    config:
      temperature: 0

prompts:
  - id: file://prompts/task-extraction.json
    label: v1-production
  - id: file://prompts/task-extraction-v2.json
    label: v2-candidate
  - id: file://prompts/task-extraction-v3.json
    label: v3-candidate

tests:
  - vars:
      caseId: multi-task
      conversation: |
        User: I need to email the landlord about renewing the lease, and also I should probably call the dentist to reschedule my cleaning. Oh and I was thinking about maybe repainting the living room at some point.
        Assistant: Got it, anything else?
        User: No that's it for now.
    assert:
      - type: javascript
        value: file://assertions/task-extraction.js

  - vars:
      caseId: no-tasks
      conversation: |
        User: I've been thinking a lot about whether remote work is actually better for productivity.
        Assistant: That's an interesting question, what's prompting it?
        User: Just reflecting on the last year I guess.
    assert:
      - type: javascript
        value: file://assertions/task-extraction.js

  - vars:
      caseId: single-task
      conversation: |
        User: I really need to renew my driver's license before it expires next month.
        Assistant: Got it.
    assert:
      - type: javascript
        value: file://assertions/task-extraction.js

  - vars:
      caseId: many-tasks
      conversation: |
        User: Okay let's plan the week. I need to book flights for the conference, submit the expense report from last trip, follow up with the vendor about the contract, and schedule a 1:1 with Sarah.
        Assistant: Anything else?
        User: Nope that covers it.
    assert:
      - type: javascript
        value: file://assertions/task-extraction.js

  - vars:
      caseId: implicit-actionable
      conversation: |
        User: I just realized my passport expired last month and we're supposed to fly internationally in six weeks.
        Assistant: Oh no, that's cutting it close.
        User: Yeah tell me about it.
    assert:
      - type: javascript
        value: file://assertions/task-extraction.js
