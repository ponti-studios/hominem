description: 'Voice task extraction — priority/due-date inference rules (v1 = production prompt verbatim, v2 = candidate revision)'

providers:
  - id: ollama:chat:gemma4:e2b-mlx
    label: gemma4-e2b-mlx (local)
    config:
      temperature: 0
  - id: openrouter:qwen/qwen3.5-flash-02-23
    label: gpt-4o (current production default)
    config:
      temperature: 0
  - id: openrouter:google/gemini-2.5-flash-lite
    label: gemini-2.5-flash-lite (current production enhance model)
    config:
      temperature: 0

prompts:
  - id: file://prompts/voice-task-extraction.json
    label: v1-production
  - id: file://prompts/voice-task-extraction-v2.json
    label: v2-candidate
  - id: file://prompts/voice-task-extraction-v3.json
    label: v3-candidate

tests:
  - vars:
      caseId: urgency-and-date
      referenceDateTime: '2026-07-06T09:00:00-07:00 (America/Los_Angeles)'
      transcript: >-
        um so I need to urgently email the landlord about the lease renewal like
        today, and uh also remind me to call the dentist next Friday no rush on that one
    assert:
      - type: javascript
        value: file://assertions/voice-task-extraction.js

  - vars:
      caseId: noon-default
      referenceDateTime: '2026-07-06T09:00:00-07:00 (America/Los_Angeles)'
      transcript: 'I need to submit the tax documents by next Friday'
    assert:
      - type: javascript
        value: file://assertions/voice-task-extraction.js

  - vars:
      caseId: in-two-weeks
      referenceDateTime: '2026-07-06T09:00:00-07:00 (America/Los_Angeles)'
      transcript: 'remind me to renew the car registration in two weeks'
    assert:
      - type: javascript
        value: file://assertions/voice-task-extraction.js

  - vars:
      caseId: explicit-clock-time
      referenceDateTime: '2026-07-06T09:00:00-07:00 (America/Los_Angeles)'
      transcript: 'I have to pick up my kid from school tomorrow at 3pm'
    assert:
      - type: javascript
        value: file://assertions/voice-task-extraction.js

  - vars:
      caseId: multi-mixed-urgency
      referenceDateTime: '2026-07-06T09:00:00-07:00 (America/Los_Angeles)'
      transcript: >-
        okay so the production server is down and someone needs to restart it ASAP,
        also I want to read that book on stoicism whenever I get a chance no particular
        rush, and uh I need to buy groceries this week
    assert:
      - type: javascript
        value: file://assertions/voice-task-extraction.js

  - vars:
      caseId: no-actionable-items
      referenceDateTime: '2026-07-06T09:00:00-07:00 (America/Los_Angeles)'
      transcript: 'um so like I was just thinking about how weird it is that time feels faster now than when I was a kid'
    assert:
      - type: javascript
        value: file://assertions/voice-task-extraction.js
