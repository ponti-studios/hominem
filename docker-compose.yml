services:
  redis:
    image: redis:latest
    container_name: hominem-redis
    ports:
      - 6379:6379
    volumes:
      - hominem-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  db:
    image: ghcr.io/charlesponti/hominem/pontistudios-postgres:latest
    platform: linux/amd64
    container_name: hominem-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hominem
    volumes:
      - hominem-db:/var/lib/postgresql/data
      # Mount an empty directory over the init scripts so local/dev startup
      # doesn't run extension bootstrap scripts. Use migrations to manage extensions.
      - ./docker/no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  test-db:
    image: ghcr.io/charlesponti/hominem/pontistudios-postgres:latest
    platform: linux/amd64
    container_name: hominem-test-postgres
    ports:
      - "4433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hominem-test
    volumes:
      - hominem-test-db:/var/lib/postgresql/data
      # Prevent init scripts from running in CI/local test DB
      - ./docker/no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  grafana-db:
    image: ghcr.io/charlesponti/hominem/pontistudios-postgres:latest
    platform: linux/amd64
    container_name: hominem-grafana-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grafana
    volumes:
      - hominem-grafana-db:/var/lib/postgresql/data
      - ./docker/no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  grafana:
    image: grafana/grafana:10.4.4
    container_name: hominem-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=grafana-db:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=postgres
      - GF_DATABASE_PASSWORD=postgres
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      grafana-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hominem

  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: hominem-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - hominem

  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: hominem-alertmanager
    volumes:
      - ./monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9093/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - hominem

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: hominem-node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - hominem

networks:
  hominem:
    driver: bridge

volumes:
  hominem-redis:
  hominem-test-db:
  hominem-db:
  hominem-grafana-db:
