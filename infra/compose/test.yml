# Test environment - ephemeral database
# Usage: docker compose -f infra/compose/test.yml up
# Teardown: docker compose -f infra/compose/test.yml down -v
# Secrets: copy infra/compose/.env.example → infra/compose/.env
#
# NOTE: Port 4433 is shared with db-test in dev.yml.
#       Do not run this alongside dev.yml simultaneously.

x-postgres-build: &postgres-build
  image: ${POSTGRES_IMAGE:-postgres:latest}
  build:
    context: ../images/postgres
    dockerfile: Dockerfile

networks:
  hominem-test:
    driver: bridge

volumes:
  hominem-db-test:

services:
  db-test:
    <<: *postgres-build
    container_name: hominem-db-test
    ports:
      - '4433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-hominem-test}
    volumes:
      - hominem-db-test:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - hominem-test
    restart: 'no'
