# Test environment - ephemeral database
# Usage: docker compose -f infra/docker/compose/test.yml up
# Teardown: docker compose -f infra/docker/compose/test.yml down -v

x-postgres-build: &postgres-build
  build:
    context: ../postgres
    dockerfile: Dockerfile

networks:
  hominem-test:
    driver: bridge

volumes:
  hominem-test-postgres:

services:
  db-test:
    <<: *postgres-build
    container_name: hominem-test-postgres
    ports:
      - '4433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hominem-test
    volumes:
      - hominem-test-postgres:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem-test
    restart: 'no'
