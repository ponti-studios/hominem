# Test environment - ephemeral database
# Usage: docker compose -f infra/docker/compose/test.yml up

x-postgres-build: &postgres-build
  build:
    context: ../..
    dockerfile: infra/docker/postgres/Dockerfile
  platform: linux/amd64

networks:
  hominem-test:
    driver: bridge

volumes:
  hominem-db-test:

services:
  db-test:
    <<: *postgres-build
    container_name: hominem-db-test
    ports:
      - '4433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hominem-test
    volumes:
      - hominem-db-test:/var/lib/postgresql
      - ./no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem-test
    # No restart - tests are ephemeral
