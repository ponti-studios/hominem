# ClickStack observability stack
# https://clickhouse.com/docs/use-cases/observability/clickstack/overview
#
# Secrets: copy infra/docker/observability/.env.example → infra/docker/observability/.env
# Usage:   make obs-up

networks:
  observability:
    driver: bridge

volumes:
  obs-ch-data:
  obs-mongo-data:

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

services:
  mongo:
    image: mongo:7.0
    volumes:
      - obs-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    <<: *default-logging
    networks:
      - observability

  ch-server:
    image: clickhouse/clickhouse-server:25.3-alpine
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-default}
    volumes:
      - obs-ch-data:/var/lib/clickhouse
      - ../observability/clickhouse-config.xml:/etc/clickhouse-server/config.d/observability.xml:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8123/ping | grep -q Ok']
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 30
    ports:
      - '8123:8123'
      - '9000:9000'
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    <<: *default-logging
    networks:
      - observability

  otel-collector:
    image: clickhouse/clickstack-otel-collector:2
    environment:
      CLICKHOUSE_ENDPOINT: tcp://ch-server:9000?dial_timeout=10s
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      HYPERDX_LOG_LEVEL: ${HYPERDX_LOG_LEVEL:-error}
      OPAMP_SERVER_URL: http://hyperdx:4320
    depends_on:
      ch-server:
        condition: service_healthy
    ports:
      - '13133:13133' # health check
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
      - '8888:8888' # collector metrics
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    <<: *default-logging
    networks:
      - observability

  hyperdx:
    image: clickhouse/clickstack-all-in-one:2
    environment:
      CLICKHOUSE_ENDPOINT: tcp://ch-server:9000?dial_timeout=10s
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      FRONTEND_URL: http://localhost:8080
      HYPERDX_API_PORT: '8000'
      HYPERDX_APP_PORT: '8080'
      HYPERDX_LOG_LEVEL: ${HYPERDX_LOG_LEVEL:-error}
      HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      MONGO_URI: mongodb://mongo:27017/hyperdx
      NEXT_TELEMETRY_DISABLED: '1'
      USAGE_STATS_ENABLED: 'false'
    depends_on:
      ch-server:
        condition: service_healthy
      mongo:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - '8080:8080'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    <<: *default-logging
    networks:
      - observability
