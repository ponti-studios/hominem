# Local development environment
# Usage: docker compose -f infra/docker/compose/base.yml -f infra/docker/compose/dev.yml up

x-postgres-build: &postgres-build
  build:
    context: ../../..
    dockerfile: infra/docker/postgres/Dockerfile
  platform: linux/amd64

x-postgres-defaults: &postgres-defaults
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

services:
  redis:
    image: redis:8.6.2-alpine
    container_name: hominem-redis
    ports:
      - 6379:6379
    volumes:
      - hominem-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  db:
    <<: *postgres-build
    container_name: hominem-db
    ports:
      - '5434:5432'
    environment:
      <<: *postgres-defaults
      POSTGRES_DB: hominem
    volumes:
      - hominem-db:/var/lib/postgresql
      - ./no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  # Test database - fresh on each run
  db-test:
    <<: *postgres-build
    container_name: hominem-db-test
    ports:
      - '4433:5432'
    environment:
      <<: *postgres-defaults
      POSTGRES_DB: hominem-test
    volumes:
      - hominem-db-test:/var/lib/postgresql
      - ./no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem
