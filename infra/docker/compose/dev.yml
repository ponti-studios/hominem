# Local development environment
# Usage: docker compose -f infra/docker/compose/base.yml -f infra/docker/compose/dev.yml up

x-postgres-build: &postgres-build
  build:
    context: ../postgres
    dockerfile: Dockerfile

x-postgres-defaults: &postgres-defaults
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

services:
  redis:
    image: redis:8.6.2-alpine
    container_name: hominem-redis
    ports:
      - 6379:6379
    volumes:
      - hominem-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  db:
    <<: *postgres-build
    container_name: hominem-postgres
    ports:
      - '5434:5432'
    environment:
      <<: *postgres-defaults
      POSTGRES_DB: hominem
    volumes:
      - hominem-postgres:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  db-test:
    <<: *postgres-build
    container_name: hominem-test-postgres
    ports:
      - '4433:5432'
    environment:
      <<: *postgres-defaults
      POSTGRES_DB: hominem-test
    volumes:
      - hominem-test-postgres:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem
