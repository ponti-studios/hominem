# Shared configuration for all environments
# Usage: docker-compose -f base.yml -f dev.yml up

networks:
  hominem:
    driver: bridge

volumes:
  hominem-redis:
  hominem-postgres:
  hominem-test-postgres:
  hominem-grafana-postgres:

# Shared environment defaults
x-postgres-defaults: &postgres-defaults
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

x-postgres-build: &postgres-build
  build:
    context: ../..
    dockerfile: docker/postgres/Dockerfile
  platform: linux/amd64
