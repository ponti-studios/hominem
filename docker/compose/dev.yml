# Local development environment
# Usage: docker-compose -f compose/base.yml -f compose/dev.yml up

x-postgres-build: &postgres-build
  build:
    context: ../..
    dockerfile: docker/postgres/Dockerfile
  platform: linux/amd64

x-postgres-defaults: &postgres-defaults
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

services:
  redis:
    image: redis:latest
    container_name: hominem-redis
    ports:
      - 6379:6379
    volumes:
      - hominem-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  db:
    <<: *postgres-build
    container_name: hominem-postgres
    ports:
      - "5434:5432"
    environment:
      <<: *postgres-defaults
      POSTGRES_DB: hominem
    volumes:
      - hominem-postgres:/var/lib/postgresql
      - ./no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  # Test database - fresh on each run
  test-db:
    <<: *postgres-build
    container_name: hominem-test-postgres
    ports:
      - "4433:5432"
    environment:
      <<: *postgres-defaults
      POSTGRES_DB: hominem-test
    volumes:
      - hominem-test-postgres:/var/lib/postgresql
      - ./no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem

  grafana-db:
    <<: *postgres-build
    container_name: hominem-grafana-postgres
    ports:
      - "5433:5432"
    environment:
      <<: *postgres-defaults
      POSTGRES_DB: grafana
    volumes:
      - hominem-grafana-postgres:/var/lib/postgresql
      - ./no-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hominem
