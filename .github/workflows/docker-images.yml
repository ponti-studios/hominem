name: Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'services/api/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docker-images.yml'

jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f services/api/Dockerfile -t hominem-api:${{ github.sha }} .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t hominem-web:${{ github.sha }} .
