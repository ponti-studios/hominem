name: Mobile · Build Preview

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-build-preview.yml'
  workflow_dispatch:

concurrency:
  group: mobile-build-preview
  cancel-in-progress: false

jobs:
  build-preview:
    name: Build Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.10'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: apps/mobile/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/mobile/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/mobile

      - name: Verify preview configuration
        run: bun run verify:preview
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit preview build
        run: bun run build:preview
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_PROFILE: preview

      - name: Create build summary
        if: always()
        run: |
          echo "## 📱 Preview Build Submitted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check your build status at: https://expo.dev" >> $GITHUB_STEP_SUMMARY

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: build-preview
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Mobile Preview Build ${{ needs.build-preview.result == 'success' && '✅ Succeeded' || '❌ Failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Mobile Preview Build ${{ needs.build-preview.result == 'success' && '✅ Succeeded' || '❌ Failed' }}*\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*View builds:* https://expo.dev"
                  }
                }
              ]
            }
        if: always()
