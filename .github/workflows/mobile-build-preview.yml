name: Mobile · Build Preview

on:
    push:
        branches: [main]
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-build-preview.yml"
    workflow_dispatch:

concurrency:
    group: mobile-build-preview
    cancel-in-progress: false

jobs:
    build-preview:
        name: Build Preview
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            manifest_path: ${{ steps.release.outputs.manifest_path }}
            release_status: ${{ steps.release.outputs.release_status }}
            build_status: ${{ steps.release.outputs.build_status }}
            build_ids: ${{ steps.release.outputs.build_ids }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile
              with:
                  install-eas-cli: "true"

            - name: Verify preview configuration
              run: bun run verify:preview
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

            - name: Run preview release build
              id: release
              run: bun run build:preview
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
                  EAS_BUILD_PROFILE: preview

            - name: Upload release manifest
              if: always() && steps.release.outputs.manifest_path != ''
              uses: actions/upload-artifact@v4
              with:
                  name: preview-release-manifest
                  path: ${{ steps.release.outputs.manifest_path }}
                  retention-days: 14
