name: validate-db

on:
  push:
    branches: [main]
    paths:
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'justfile'
      - 'scripts/**'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-db.yml'
  pull_request:
    branches: [main, preview]
    paths:
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'justfile'
      - 'scripts/**'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-db.yml'

concurrency:
  group: db-migrations-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  db-migrations:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TELEMETRY_DISABLED: '1'

    strategy:
      matrix:
        node-version: [24.14.1]
        go-version: ['1.25']

    services:
      postgres:
        image: ghcr.io/${{ github.repository }}/postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

    steps:
      - name: checkout-repository
        uses: actions/checkout@v7

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: ${{ matrix.node-version }}

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: validate-migrations
        run: just db validate test

      - name: validate-generated-types
        run: |
          DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:5434/app-test" just db codegen
          git diff --exit-code packages/db/src/types/database.ts
