name: validate-db

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/db/**'
      - 'pnpm-lock.yaml'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-db.yml'
  pull_request:
    branches: [main, preview]
    paths:
      - 'packages/core/db/**'
      - 'pnpm-lock.yaml'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-db.yml'

concurrency:
  group: db-migrations-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  db-migrations:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.14.1]
        go-version: ['1.22']

    services:
      postgres:
        image: ghcr.io/${{ github.repository }}/postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hominem-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4433:5432

    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: ${{ matrix.node-version }}

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: validate-migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:4433/hominem-test
        run: just validate-migrations
