name: deploy-mobile

on:
  workflow_run:
    workflows: [validate-mobile]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mobile-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-production:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: checkout-repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: '24.14.1'

      - name: setup-eas
        run: npm install -g eas-cli@18

      - name: validate-ios-production-config
        working-directory: apps/omiro
        env:
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: |
          test -n "$EXPO_APPLE_TEAM_ID" || {
            echo "Missing EXPO_APPLE_TEAM_ID secret. Production iOS builds require the Apple Team ID so Expo can generate the correct native targets and credentials mapping."
            exit 1
          }

      - name: prebuild-production-ios-project
        working-directory: apps/omiro
        env:
          APP_VARIANT: production
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: pnpm exec expo prebuild --platform ios --clean --no-install

      - name: submit-build
        working-directory: apps/omiro
        env:
          APP_VARIANT: production
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile production \
            --auto-submit \
            --non-interactive
