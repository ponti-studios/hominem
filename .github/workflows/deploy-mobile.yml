name: mobile-release-candidate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Green main commit or tag to release
        required: true
        default: main
        type: string

concurrency:
  group: mobile-release-candidate
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  release-candidate:
    name: Build and submit TestFlight candidate
    runs-on: ubuntu-latest
    environment: omiro-testflight
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

    steps:
      - name: checkout-release-ref
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: '24.14.1'

      - name: validate-mobile
        run: |
          just check mobile
          just mobile cng-check

      - name: validate-eas-build-config
        run: just mobile build-config-check

      - name: build-and-submit-production
        working-directory: apps/omiro
        run: >-
          pnpm dlx eas-cli@21.2.0 build
          --platform ios
          --profile production
          --auto-submit
          --non-interactive

      - name: write-release-manifest
        working-directory: apps/omiro
        run: |
          mkdir -p ../../artifacts
          pnpm dlx eas-cli@21.2.0 build:list --platform ios --build-profile production --git-commit-hash "${GITHUB_SHA}" --limit 1 --json --non-interactive > ../../artifacts/omiro-release-build.json
          node ../../scripts/create-omiro-release-manifest.mjs ../../artifacts/omiro-release-build.json ../../artifacts/omiro-release-manifest.json

      - name: upload-release-manifest
        uses: actions/upload-artifact@v4
        with:
          name: omiro-release-${{ github.run_id }}
          path: artifacts/omiro-release-manifest.json
