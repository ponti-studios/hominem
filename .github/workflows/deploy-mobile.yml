name: deploy-mobile

on:
  workflow_run:
    workflows: [validate-mobile]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mobile-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-production:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: checkout-repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: '24.14.1'

      - name: setup-eas
        run: npm install -g eas-cli@18

      - name: prebuild
        working-directory: apps/omiro
        env:
          APP_ENV: production
          OMIRO_RELEASE_CHANNEL: production
          EXPO_RUNTIME_VERSION: ios-r1
        run: pnpm exec expo prebuild --platform ios --clean --no-install

      - name: submit-build
        working-directory: apps/omiro
        env:
          APP_ENV: production
          OMIRO_RELEASE_CHANNEL: production
          EXPO_RUNTIME_VERSION: ios-r1
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          pnpm exec eas build \
            --platform ios \
            --profile production \
            --auto-submit \
            --non-interactive
