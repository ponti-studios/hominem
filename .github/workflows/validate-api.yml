name: validate-api

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/validate-api.yml'
  pull_request:

concurrency:
  group: validate-api-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate-api:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.14.1]

    services:
      postgres:
        image: ghcr.io/${{ github.repository }}/postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hominem-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4433:5432

    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: setup-node-js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: setup-pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0

      - name: setup-just
        uses: taiki-e/install-action@just

      - name: get-pnpm-store-directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: setup-pnpm-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: install-dependencies
        run: pnpm install --frozen-lockfile

      - name: setup-go-for-migrations
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: run-database-migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:4433/hominem-test
        run: just db-setup

      - name: run-validate-api
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:4433/hominem-test
        run: just validate-api
