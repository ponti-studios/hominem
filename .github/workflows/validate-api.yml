name: validate-api

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.json'
      - 'tsconfig.profiles/**'
      - 'justfile'
      - 'justfiles/**'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-api.yml'
  pull_request:

concurrency:
  group: validate-api-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate-api:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.14.1]

    services:
      postgres:
        image: ghcr.io/${{ github.repository }}/postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hominem-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4433:5432

    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: ${{ matrix.node-version }}

      - name: setup-go-for-migrations
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: run-database-migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:4433/hominem-test
        run: just db-setup

      - name: run-tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:4433/hominem-test
        run: just test-api
