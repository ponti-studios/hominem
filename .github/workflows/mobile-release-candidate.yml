name: mobile-release-candidate

on:
    workflow_dispatch:
    schedule:
        - cron: "0 14 * * 1"

concurrency:
    group: mobile-release-candidate
    cancel-in-progress: false

jobs:
    release-candidate:
        name: Preview RC + Detox smoke
        runs-on: macos-15
        timeout-minutes: 75
        permissions:
            contents: read
        env:
            DETOX_SIMULATOR_DEVICE: "iPhone 16 Pro"

        steps:
            - name: Verify EXPO_TOKEN
              run: |
                  if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
                    echo "::error::EXPO_TOKEN secret is not set. Preview env verification requires EAS access."
                    exit 1
                  fi

            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup
              with:
                  install-flags: "--frozen-lockfile"

            - name: Setup EAS
              uses: expo/expo-github-action@v8
              with:
                  eas-version: 10.0.3
                  token: ${{ secrets.EXPO_TOKEN }}

            - name: Install simulator tooling
              run: |
                  brew tap wix/brew
                  HOMEBREW_NO_AUTO_UPDATE=1 brew install applesimutils

            - name: Show Xcode and simulators
              run: |
                  xcodebuild -version
                  xcrun simctl list devices available | cat

            - name: Mobile release candidate gate
              run: make mobile.rc
              env:
                  EXPO_PUBLIC_API_BASE_URL: "http://localhost:4040"

            - name: Build iOS simulator binary
              run: make mobile.e2e.build

            - name: Run Detox smoke
              run: make mobile.e2e.smoke.ci

            - name: Upload Detox artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: mobile-detox-smoke-artifacts
                  path: apps/mobile/artifacts/detox-smoke
                  if-no-files-found: ignore
                  retention-days: 7
