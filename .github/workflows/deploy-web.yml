name: deploy-web

on:
  workflow_run:
    workflows: [validate-web]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-web:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/railway-deploy-service.yml
    secrets:
      service_target: ${{ secrets.RAILWAY_SERVICE_WEB }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    with:
      service_name: web
      checkout_ref: ${{ github.event.workflow_run.head_sha || github.sha }}
