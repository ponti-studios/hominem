name: deploy-workers

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.json'
      - 'tsconfig.profiles/**'
      - 'justfile'
      - 'justfiles/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-workers:
    uses: ./.github/workflows/railway-deploy-service.yml
    secrets:
      service_target: ${{ secrets.RAILWAY_SERVICE_WORKERS }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    with:
      service_name: workers