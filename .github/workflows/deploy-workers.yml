name: deploy-workers

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.json'
      - 'tsconfig.profiles/**'
      - 'justfile'
      - 'justfiles/**'
      - '.github/workflows/deploy-workers.yml'

jobs:
  deploy-workers:
    uses: ./.github/workflows/railway-deploy-service.yml
    secrets: inherit
    with:
      service_name: workers
      service_target: ${{ secrets.RAILWAY_SERVICE_WORKERS }}