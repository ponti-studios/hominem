name: DB Migrations

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/core/db/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/db-migrations.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/core/db/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/db-migrations.yml'

concurrency:
  group: db-migrations-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  db-migrations:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.18.0]
        go-version: ['1.22']

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hominem-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4433:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:4433/hominem-test
        run: just db-migrations-validate
