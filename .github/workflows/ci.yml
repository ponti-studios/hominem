name: CI

on:
    pull_request:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            web: ${{ steps.filter.outputs.web }}
            api: ${{ steps.filter.outputs.api }}
            shared: ${{ steps.filter.outputs.shared }}
            config: ${{ steps.filter.outputs.config }}
            infra: ${{ steps.filter.outputs.infra }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      web:
                        - 'apps/web/**'
                      api:
                        - 'services/api/**'
                      shared:
                        - 'packages/**'
                      config:
                        - 'package.json'
                        - 'bun.lock'
                        - 'turbo.json'
                        - 'tsconfig.json'
                        - 'tsconfig.profiles/**'
                        - '.github/actions/**'
                        - '.github/workflows/ci.yml'
                      infra:
                        - 'infra/compose/**'

    lint-typecheck:
        name: Lint & Typecheck
        runs-on: ubuntu-latest
        needs: changes
        steps:
            - uses: actions/checkout@v4
            - &setup-toolchain
              uses: ./.github/actions/setup-toolchain
            - uses: ./.github/actions/setup
              with:
                  install-flags: ""
            - name: Lint
              run: just lint
            - name: Typecheck
              run: just typecheck

    test-api:
        name: Test API
        runs-on: ubuntu-latest
        needs: changes
        if: >-
            github.event_name == 'workflow_dispatch' ||
            needs.changes.outputs.api == 'true' ||
            needs.changes.outputs.shared == 'true' ||
            needs.changes.outputs.config == 'true'
        permissions:
            contents: read
            packages: read
        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:4433/hominem-test?sslmode=disable
            REDIS_URL: "redis://localhost:6379"
            POSTGRES_IMAGE: ghcr.io/${{ github.repository }}/postgres:latest
        steps:
            - uses: actions/checkout@v4
            - *setup-toolchain
            - uses: ./.github/actions/start-compose-services
              with:
                  compose-files: infra/compose/base.yml infra/compose/dev.yml
                  services: redis db-test
                  project-name: ci-test-api
            - uses: ./.github/actions/setup
              with:
                  install-flags: ""
            - uses: ./.github/actions/db-setup
              with:
                  environment: test
            - name: Run API tests
              run: just test-api

    test-web:
        name: Test Web
        runs-on: ubuntu-latest
        needs: changes
        if: >-
            github.event_name == 'workflow_dispatch' ||
            needs.changes.outputs.web == 'true' ||
            needs.changes.outputs.shared == 'true' ||
            needs.changes.outputs.config == 'true'
        steps:
            - uses: actions/checkout@v4
            - *setup-toolchain
            - uses: ./.github/actions/setup
              with:
                  install-flags: ""
            - name: Run web tests
              run: just test-web

    db-migrations:
        name: DB Migrations
        runs-on: ubuntu-latest
        needs: changes
        if: >-
            github.event_name == 'workflow_dispatch' ||
            needs.changes.outputs.api == 'true' ||
            needs.changes.outputs.shared == 'true' ||
            needs.changes.outputs.config == 'true' ||
            needs.changes.outputs.infra == 'true'
        permissions:
            contents: read
            packages: read
        env:
            DATABASE_URL: postgres://postgres:postgres@localhost:4433/hominem-test?sslmode=disable
            POSTGRES_IMAGE: ghcr.io/${{ github.repository }}/postgres:latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup-toolchain
              with:
                  install-node: "true"
            - uses: ./.github/actions/start-compose-services
              with:
                  compose-files: infra/compose/test.yml
                  services: db-test
                  project-name: ci-db-migrations
            - uses: ./.github/actions/setup
              with:
                  install-flags: ""
                  install-goose: "true"
            - name: Validate migrations are idempotent
              run: just db-migrations-validate

    build-web:
        name: Build Web
        runs-on: ubuntu-latest
        needs: changes
        if: >-
            github.event_name == 'workflow_dispatch' ||
            needs.changes.outputs.web == 'true' ||
            needs.changes.outputs.shared == 'true' ||
            needs.changes.outputs.config == 'true'
        env:
            VITE_APP_BASE_URL: "https://example.com"
            VITE_PUBLIC_API_URL: "http://localhost:4040"
            VITE_R2_DOMAIN: "test-domain"
        steps:
            - uses: actions/checkout@v4
            - *setup-toolchain
            - uses: ./.github/actions/setup
              with:
                  install-flags: ""
            - name: Build web app
              run: just build-web

    build-api:
        name: Build API
        runs-on: ubuntu-latest
        needs: changes
        if: >-
            github.event_name == 'workflow_dispatch' ||
            needs.changes.outputs.api == 'true' ||
            needs.changes.outputs.shared == 'true' ||
            needs.changes.outputs.config == 'true'
        steps:
            - uses: actions/checkout@v4
            - *setup-toolchain
            - uses: ./.github/actions/setup
              with:
                  install-flags: ""
            - name: Build API
              run: just build-api

    e2e-web-auth:
        name: E2E Web Auth
        runs-on: ubuntu-latest
        needs: changes
        if: >-
            github.event_name == 'workflow_dispatch' ||
            needs.changes.outputs.web == 'true' ||
            needs.changes.outputs.api == 'true' ||
            needs.changes.outputs.shared == 'true' ||
            needs.changes.outputs.config == 'true'
        permissions:
            contents: read
            packages: read
        env:
            COOKIE_SECRET: ${{ secrets.COOKIE_SECRET_TEST }}
            DATABASE_URL: postgresql://postgres:postgres@localhost:4433/hominem-test?sslmode=disable
            REDIS_URL: "redis://localhost:6379"
            OPENROUTER_API_KEY: "some-placeholder-key"
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            VITE_APP_BASE_URL: "https://example.com"
            VITE_GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
            VITE_PUBLIC_API_URL: "http://localhost:4040"
            VITE_R2_DOMAIN: "test-domain"
            POSTGRES_IMAGE: ghcr.io/${{ github.repository }}/postgres:latest
        steps:
            - uses: actions/checkout@v4
            - *setup-toolchain
            - uses: ./.github/actions/start-compose-services
              with:
                  compose-files: infra/compose/base.yml infra/compose/dev.yml
                  services: redis db-test
                  project-name: ci-e2e-web-auth
            - uses: ./.github/actions/setup
              with:
                  install-flags: ""
            - uses: ./.github/actions/db-setup
              with:
                  environment: test
            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ hashFiles('apps/web/package.json') }}
                  restore-keys: playwright-chromium-
            - name: Install Playwright browsers
              run: just web-install-playwright
              timeout-minutes: 20
            - name: Run web auth E2E tests
              run: just web-test-e2e
              timeout-minutes: 20
              env:
                  AUTH_TEST_OTP_ENABLED: "true"
                  AUTH_E2E_SECRET: "otp-secret"
                  SEND_EMAILS: "false"

