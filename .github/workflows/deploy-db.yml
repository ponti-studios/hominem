name: deploy-db-migrations

on:
  workflow_run:
    workflows: [validate-db]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-db-migrations-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-db-migrations:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: checkout-repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: install-goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.0

      - name: apply-database-migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          goose_bin="$(go env GOPATH)/bin/goose"
          "$goose_bin" -dir packages/core/db/migrations postgres "$DATABASE_URL" up
