name: Mobile · Lint & Type Check

on:
    push:
        branches: [main, develop]
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-lint.yml"
    pull_request:
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-lint.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Run linter
              run: bun run lint
              working-directory: apps/mobile

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Run type checker
              run: bun run typecheck
              working-directory: apps/mobile
