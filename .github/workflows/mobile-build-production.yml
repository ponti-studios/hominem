name: Mobile · Build Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes-produce" to confirm production build'
        required: true
        type: string

concurrency:
  group: mobile-build-production
  cancel-in-progress: false

jobs:
  verify-confirmation:
    name: Verify Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes-produce" ]; then
            echo "❌ Confirmation mismatch. Type 'yes-produce' to confirm production build."
            exit 1
          fi
          echo "✅ Production build confirmed"

  build-production:
    name: Build Production
    runs-on: ubuntu-latest
    needs: verify-confirmation
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.10'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: apps/mobile/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/mobile/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/mobile

      - name: Verify production configuration
        run: bun run verify:production
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit production build
        run: bun run build:production
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_PROFILE: production

      - name: Create build summary
        if: always()
        run: |
          echo "## 🚀 Production Build Submitted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **This build will auto-submit to App Store and Google Play**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check your build status at: https://expo.dev" >> $GITHUB_STEP_SUMMARY

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: build-production
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Mobile Production Build ${{ needs.build-production.result == 'success' && '✅ Succeeded' || '❌ Failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Mobile Production Build ${{ needs.build-production.result == 'success' && '✅ Succeeded' || '❌ Failed' }}*\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Triggered by:* ${{ github.actor }}\n*View builds:* https://expo.dev"
                  }
                }
              ]
            }
        if: always()
