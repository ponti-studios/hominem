name: Mobile · Build Production

on:
    workflow_dispatch:
        inputs:
            confirm:
                description: 'Type "yes-produce" to confirm production build'
                required: true
                type: string

concurrency:
    group: mobile-build-production
    cancel-in-progress: false

jobs:
    verify-confirmation:
        name: Verify Confirmation
        runs-on: ubuntu-latest
        steps:
            - name: Verify confirmation
              run: |
                  if [ "${{ github.event.inputs.confirm }}" != "yes-produce" ]; then
                    echo "❌ Confirmation mismatch. Type 'yes-produce' to confirm production build."
                    exit 1
                  fi
                  echo "✅ Production build confirmed"

    build-production:
        name: Build Production
        runs-on: ubuntu-latest
        needs: verify-confirmation
        permissions:
            contents: read
        outputs:
            manifest_path: ${{ steps.release.outputs.manifest_path }}
            release_status: ${{ steps.release.outputs.release_status }}
            build_status: ${{ steps.release.outputs.build_status }}
            build_ids: ${{ steps.release.outputs.build_ids }}
            submission_status: ${{ steps.release.outputs.submission_status }}
            submission_ids: ${{ steps.release.outputs.submission_ids }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile
              with:
                  install-eas-cli: "true"

            - name: Verify production configuration
              run: bun run verify:production
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

            - name: Run production release
              id: release
              run: bun run build:production
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
                  EAS_BUILD_PROFILE: production
                  SKIP_RELEASE_CONFIRMATION: "1"

            - name: Upload release manifest
              if: always() && steps.release.outputs.manifest_path != ''
              uses: actions/upload-artifact@v4
              with:
                  name: production-release-manifest
                  path: ${{ steps.release.outputs.manifest_path }}
                  retention-days: 30
