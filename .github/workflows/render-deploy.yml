name: Render Deploy

on:
  push:
    branches: [preview, main]
    paths:
      - 'render.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'justfile'
      - 'justfiles/**'
      - 'apps/web/**'
      - 'services/api/**'
      - 'packages/**'
      - '.github/workflows/render-deploy.yml'
  workflow_dispatch:

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ghcr.io/${{ github.repository }}/postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hominem-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4433:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0

      - name: Setup just
        uses: taiki-e/install-action@just

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:4433/hominem-test
        run: just db-migrations-validate

      - name: Run API checks
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:4433/hominem-test
        run: just check-api

      - name: Run web checks
        run: just check-web

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'render-production' || 'render-preview' }}

    steps:
      - name: Set deployment targets
        id: targets
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "api_base_url=https://api.ponti.io" >> "$GITHUB_OUTPUT"
            echo "app_base_url=https://app.ponti.io" >> "$GITHUB_OUTPUT"
          else
            echo "api_base_url=https://api.preview.ponti.io" >> "$GITHUB_OUTPUT"
            echo "app_base_url=https://app.preview.ponti.io" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger API deploy
        env:
          RENDER_API_DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$RENDER_API_DEPLOY_HOOK_URL"

      - name: Wait for API health
        env:
          API_BASE_URL: ${{ steps.targets.outputs.api_base_url }}
        shell: bash
        run: |
          for _ in {1..60}; do
            if curl --fail --silent --show-error "$API_BASE_URL/api/status" > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "API failed health check after deploy" >&2
          exit 1

      - name: Trigger worker deploy
        env:
          RENDER_WORKER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_WORKER_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$RENDER_WORKER_DEPLOY_HOOK_URL"

      - name: Allow worker rollout to begin
        run: sleep 20

      - name: Trigger web deploy
        env:
          RENDER_WEB_DEPLOY_HOOK_URL: ${{ secrets.RENDER_WEB_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$RENDER_WEB_DEPLOY_HOOK_URL"

      - name: Wait for web health
        env:
          APP_BASE_URL: ${{ steps.targets.outputs.app_base_url }}
        shell: bash
        run: |
          for _ in {1..60}; do
            if curl --fail --silent --show-error "$APP_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Web failed health check after deploy" >&2
          exit 1

      - name: Smoke test deployment
        env:
          API_BASE_URL: ${{ steps.targets.outputs.api_base_url }}
          APP_BASE_URL: ${{ steps.targets.outputs.app_base_url }}
        shell: bash
        run: |
          curl --fail --silent --show-error "$API_BASE_URL/api/status" > /dev/null
          curl --fail --silent --show-error "$APP_BASE_URL" | grep -qi '<html'
