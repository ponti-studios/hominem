name: code-quality

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

concurrency:
    group: code-quality-${{ github.ref }}
    cancel-in-progress: true

env:
    COOKIE_SECRET: ${{ secrets.COOKIE_SECRET_TEST }}
    DATABASE_URL: postgresql://postgres:postgres@localhost:4433/hominem-test?sslmode=disable
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    REDIS_URL: "redis://localhost:6379"
    RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_TEST }}
    RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
    RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
    SEND_EMAILS: "false"
    AUTH_TEST_OTP_ENABLED: "true"
    AUTH_E2E_SECRET: "otp-secret"
    R2_ENDPOINT: "http://localhost:4567"
    R2_ACCESS_KEY_ID: "test-key"
    R2_SECRET_ACCESS_KEY: "test-secret"
    VITE_APP_BASE_URL: "https://example.com"
    VITE_GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
    VITE_PUBLIC_API_URL: "http://localhost:4040"
    VITE_R2_DOMAIN: "test-domain"

jobs:
    static-lint:
        name: static:lint
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
            - name: 🔬 Lint
              run: bun run lint
              timeout-minutes: 10

    db-migrations:
        name: db:migrations
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        services:
            postgres:
                image: ghcr.io/hackefeller/postgres:latest
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: hominem-test
                options: >-
                    --health-cmd "pg_isready -h localhost -p 5432 -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
                  install-goose: "true"
            - name: 🛡️ Validate DB migrations (lint)
              run: cd packages/db && npx --yes squawk-cli --no-error-on-unmatched-pattern --exclude-path '*schema_baseline.sql' migrations/*.sql
            - name: 🗄️ Validate migrations run and are idempotent
              env:
                  DATABASE_URL: postgres://postgres:postgres@localhost:5432/hominem-test?sslmode=disable
              run: |
                  goose -dir packages/db/migrations postgres "$DATABASE_URL" up
                  goose -dir packages/db/migrations postgres "$DATABASE_URL" up
                  STATUS=$(goose -dir packages/db/migrations postgres "$DATABASE_URL" status)
                  echo "$STATUS"
                  if echo "$STATUS" | grep -Ei 'Pending|pending'; then
                    echo "Pending migrations remain after goose up"
                    exit 1
                  fi

    build-monorepo:
        name: build:monorepo
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
            - name: 🏗️ Build
              run: bun run build
              timeout-minutes: 30

    build-rpc:
        name: build:rpc
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
            - name: 🧱 Build `rpc` package
              run: bun run --filter @hominem/rpc build

    test-unit:
        name: test:unit
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        services:
            postgres:
                image: ghcr.io/hackefeller/postgres:latest
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: hominem-test
                options: >-
                    --health-cmd "pg_isready -h localhost -p 5432 -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 4433:5432
            redis:
                image: redis
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v4
            - name: Install PostgreSQL client tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y postgresql-client
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
            - name: 🏗️ Wait for services
              run: |
                  until pg_isready -h localhost -p 4433; do
                    echo "Waiting for postgres..."
                    sleep 2
                  done
                  until nc -z localhost 6379; do
                    echo "Waiting for redis..."
                    sleep 2
                  done
                  echo "All services are ready!"
            - name: 🗄️ Initialize test database schema
              uses: ./.github/actions/db-setup
              with:
                  environment: test
            - name: 🧪 Unit tests
              run: bun run test
              timeout-minutes: 15

    test-api-integration:
        name: test:api-integration
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        services:
            postgres:
                image: ghcr.io/hackefeller/postgres:latest
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: hominem-test
                options: >-
                    --health-cmd "pg_isready -h localhost -p 5432 -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 4433:5432
            redis:
                image: redis
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v4
            - name: Install PostgreSQL client tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y postgresql-client
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
            - name: 🏗️ Wait for services
              run: |
                  until pg_isready -h localhost -p 4433; do
                    echo "Waiting for postgres..."
                    sleep 2
                  done
                  until nc -z localhost 6379; do
                    echo "Waiting for redis..."
                    sleep 2
                  done
                  echo "All services are ready!"
            - name: 🗄️ Initialize test database schema
              uses: ./.github/actions/db-setup
              with:
                  environment: test
            - name: 🧪 API integration tests
              run: bun run --filter @hominem/api test:integration
              timeout-minutes: 10

    test-auth-contract:
        name: test:auth-contract
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        services:
            postgres:
                image: ghcr.io/hackefeller/postgres:latest
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: hominem-test
                options: >-
                    --health-cmd "pg_isready -h localhost -p 5432 -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 4433:5432
            redis:
                image: redis
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v4
            - name: Install PostgreSQL client tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y postgresql-client
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
            - name: 🏗️ Wait for services
              run: |
                  until pg_isready -h localhost -p 4433; do
                    echo "Waiting for postgres..."
                    sleep 2
                  done
                  until nc -z localhost 6379; do
                    echo "Waiting for redis..."
                    sleep 2
                  done
                  echo "All services are ready!"
            - name: 🗄️ Initialize test database schema
              uses: ./.github/actions/db-setup
              with:
                  environment: test
            - name: 🔐 API auth contract tests
              run: bun run --filter @hominem/api test:auth:contract
              timeout-minutes: 10

    test-mobile:
        name: test:mobile
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
            - name: 🔬 Mobile lint
              run: bun run --filter @hominem/mobile lint
            - name: 📱 Verify mobile gate
              run: bun run --filter @hominem/mobile check:expo-config
              env:
                  EXPO_PUBLIC_API_BASE_URL: "http://localhost:4040"
                  EXPO_PUBLIC_R2_DOMAIN: "test-domain"
            - name: 📱 Mobile auth verification lane
              run: bun run --filter @hominem/mobile test
              timeout-minutes: 15
              env:
                  EXPO_PUBLIC_API_BASE_URL: "http://localhost:4040"
                  EXPO_PUBLIC_R2_DOMAIN: "test-domain"

    test-web-auth-e2e:
        name: test:web-auth-e2e
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: read
        services:
            postgres:
                image: ghcr.io/hackefeller/postgres:latest
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: hominem-test
                options: >-
                    --health-cmd "pg_isready -h localhost -p 5432 -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 4433:5432
            redis:
                image: redis
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v4
            - name: Install PostgreSQL client tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y postgresql-client
            - uses: ./.github/actions/setup
              with:
                  install-flags: "--force"
            - name: 🏗️ Wait for services
              run: |
                  until pg_isready -h localhost -p 4433; do
                    echo "Waiting for postgres..."
                    sleep 2
                  done
                  until nc -z localhost 6379; do
                    echo "Waiting for redis..."
                    sleep 2
                  done
                  echo "All services are ready!"
            - name: 🗄️ Initialize test database schema
              uses: ./.github/actions/db-setup
              with:
                  environment: test
            - name: 🌐 Install Playwright browsers
              run: |
                  cd apps/web && bunx playwright install --with-deps chromium
              timeout-minutes: 20
            - name: 🌐 Web auth E2E tests
              run: bun run --filter @hominem/web test:e2e
              timeout-minutes: 20
              env:
                  AUTH_TEST_OTP_ENABLED: "true"
                  AUTH_E2E_SECRET: "otp-secret"
                  SEND_EMAILS: "false"

    analyze:
        name: analyze
        runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
        timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 60 }}
        permissions:
            actions: read
            contents: read
            security-events: write

        strategy:
            fail-fast: false
            matrix:
                language: ["javascript"]
                # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby', 'swift' ]
                # Use only 'java' to analyze code written in Java, Kotlin or both
                # Use only 'javascript' to analyze code written in JavaScript, TypeScript or both
                # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support

        steps:
            - name: Cancel Previous Runs
              uses: styfle/cancel-workflow-action@0.12.1

            - name: Checkout repository
              uses: actions/checkout@v4

            # Initializes the CodeQL tools for scanning.
            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
                  # If you wish to specify custom queries, you can do so here or in a config file.
                  # By default, queries listed here will override any specified in a config file.
                  # Prefix the list here with "+" to use these queries and those in the config file.

                  # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
                  # queries: security-extended,security-and-quality

            # Autobuild attempts to build any compiled languages (C/C++, C#, Go, Java, or Swift).
            # If this step fails, then you should remove it and run the build manually (see below)
            - name: Autobuild
              uses: github/codeql-action/autobuild@v4

            # ℹ️ Command-line programs to run using the OS shell.
            # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun

            #   If the Autobuild fails above, remove it and uncomment the following three lines.
            #   modify them (or add more) to build your code if your project, please refer to the EXAMPLE below for guidance.

            # - run: |
            #     echo "Run, Build Application using script"
            #     ./location_of_script_within_repo/buildscript.sh

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
              with:
                  category: "/language:${{matrix.language}}"
