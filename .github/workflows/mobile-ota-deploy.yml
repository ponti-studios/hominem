name: mobile-ota-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - '.github/workflows/mobile-ota-deploy.yml'

concurrency:
  group: mobile-ota-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: EAS Update → preview
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Verify EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN secret is not set. See https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          install-flags: "--frozen-lockfile"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Typecheck mobile
        run: bunx tsc -p apps/mobile/tsconfig.json --noEmit

      - name: Mobile unit tests
        run: |
          set -o pipefail
          bun run --filter @hominem/mobile test:unit:auth -- --reporter=default --reporter=json --outputFile.json=mobile-auth-unit.vitest.json 2>&1 | tee mobile-auth-unit.log
          {
            echo '### Mobile auth unit test summary'
            echo
            grep -E 'Test Files|Tests |Duration' mobile-auth-unit.log | tail -n 20 || true
            echo
            node scripts/summarize-vitest-report.mjs mobile-auth-unit.vitest.json '### Mobile auth unit slowest tests' 5 250
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          EXPO_PUBLIC_API_BASE_URL: "http://localhost:4040"

      - name: Verify Expo config
        run: bun run --filter @hominem/mobile verify:expo-config
        env:
          APP_VARIANT: preview
          EXPO_NO_DOTENV: "1"
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_E2E_TESTING: "false"

      - name: Verify preview EAS env
        run: bun run --filter @hominem/mobile verify:eas-env:preview

      - name: Publish OTA update → preview
        working-directory: apps/mobile
        env:
          APP_VARIANT: preview
          EXPO_NO_DOTENV: "1"
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_E2E_TESTING: "false"
        run: eas update --auto --platform ios --branch preview --clear-cache --non-interactive --environment preview
