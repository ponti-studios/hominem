name: mobile-ota-deploy

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "Makefile"
            - "package.json"
            - ".github/actions/setup/action.yml"
            - ".github/workflows/mobile-ota-deploy.yml"

concurrency:
    group: mobile-ota-deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        name: EAS Update → preview
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Verify EXPO_TOKEN
              run: |
                  if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
                    echo "::error::EXPO_TOKEN secret is not set. See https://docs.expo.dev/eas-update/github-actions"
                    exit 1
                  fi

            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup
              with:
                  install-flags: "--frozen-lockfile"

            - name: Setup EAS
              uses: expo/expo-github-action@v8
              with:
                  eas-version: 10.0.3
                  token: ${{ secrets.EXPO_TOKEN }}

            - name: Publish OTA update → preview
              run: make mobile.ota.publish.preview
