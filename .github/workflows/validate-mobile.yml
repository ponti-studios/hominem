name: validate-mobile

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-mobile.yml'
  pull_request:
    branches: [main, preview]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-mobile.yml'

concurrency:
  group: validate-mobile-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate-mobile:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.14.1]

    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: ${{ matrix.node-version }}

      - name: lint
        run: just mobile-lint

      - name: run-tests
        run: just mobile-test
