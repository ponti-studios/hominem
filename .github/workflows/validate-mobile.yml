name: validate-mobile

on:
  push:
    branches: [main]
    paths:
      - 'apps/omiro/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'justfile'
      - 'scripts/**'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-mobile.yml'
  pull_request:
    branches: [main, preview]
    paths:
      - 'apps/omiro/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'justfile'
      - 'scripts/**'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-mobile.yml'

concurrency:
  group: validate-mobile-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate-mobile:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TELEMETRY_DISABLED: '1'
      NODE_ENV: test
      OPENROUTER_API_KEY: 'some-random-key'
      REDIS_URL: redis://localhost:6379
      RESEND_API_KEY: 'some-resend-api-key'
      RESEND_FROM_EMAIL: 'test@example.com'
      RESEND_FROM_NAME: 'Test Sender'

    strategy:
      matrix:
        node-version: [24.14.1]

    services:
      postgres:
        image: ghcr.io/${{ github.repository }}/postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432
      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: checkout-repository
        uses: actions/checkout@v6

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: ${{ matrix.node-version }}

      - name: setup-go-for-migrations
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: run-database-migrations
        run: just db migrate test

      - name: validate-mobile
        run: just check mobile
