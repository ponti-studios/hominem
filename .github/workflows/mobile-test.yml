name: Mobile · Tests

on:
    push:
        branches: [main, develop]
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-test.yml"
    pull_request:
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-test.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Run unit tests
              run: bun run test:unit
              working-directory: apps/mobile

    render-tests:
        name: Render Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Run render tests
              run: bun run test:render
              working-directory: apps/mobile

    contract-tests:
        name: Contract Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Run contract tests
              run: bun run test:contracts
              working-directory: apps/mobile

    test-results:
        name: Test Results
        runs-on: ubuntu-latest
        needs: [unit-tests, render-tests, contract-tests]
        if: always()
        steps:
            - name: Check test status
              run: |
                  if [ "${{ needs.unit-tests.result }}" != "success" ] || [ "${{ needs.render-tests.result }}" != "success" ] || [ "${{ needs.contract-tests.result }}" != "success" ]; then
                    echo "❌ Tests failed"
                    exit 1
                  fi
                  echo "✅ All tests passed"
