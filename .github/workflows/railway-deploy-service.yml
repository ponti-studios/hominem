on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      checkout_ref:
        required: false
        type: string
        default: ''
      config_path:
        required: false
        type: string
        default: ''
    secrets:
      service_target:
        required: true
      RAILWAY_TOKEN:
        required: true

concurrency:
  group: railway-deploy-${{ inputs.service_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SERVICE: ${{ secrets.service_target }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: install-railway-cli
        # Pin to a specific npm version for reproducibility.
        run: npm install -g @railway/cli@4.58.0

      - name: validate-env
        run: test -n "$SERVICE" && test -n "$RAILWAY_TOKEN"

      - name: stage-railway-config
        if: inputs.config_path != ''
        run: cp "${{ inputs.config_path }}" railway.json

      - run: railway up --ci --service "$SERVICE"
