name: deploy-service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
    secrets:
      service_target:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: deploy-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    timeout-minutes: 30
    env:
      SERVICE: ${{ secrets.service_target }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: validate-env
        run: test -n "$SERVICE" && test -n "$RAILWAY_TOKEN"

      - run: railway up --ci --service "$SERVICE"
