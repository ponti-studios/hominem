on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      checkout_ref:
        required: false
        type: string
        default: ''
      config_path:
        required: false
        type: string
        default: ''
    secrets:
      service_target:
        required: true
      RAILWAY_TOKEN:
        required: true

concurrency:
  group: railway-deploy-${{ inputs.service_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SERVICE: ${{ secrets.service_target }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: install-railway-cli
        # Pin to a specific npm version for reproducibility.
        run: npm install -g @railway/cli@4.58.0

      - name: validate-env
        run: |
          test -n "$SERVICE" || {
            echo "Missing Railway service target secret for '${{ inputs.service_name }}'."
            exit 1
          }
          test -n "$RAILWAY_TOKEN" || {
            echo "Missing RAILWAY_TOKEN secret."
            exit 1
          }

      - name: stage-railway-config
        if: inputs.config_path != ''
        run: cp "${{ inputs.config_path }}" railway.json

      - name: deploy-to-railway
        run: |
          echo "Deploying '${{ inputs.service_name }}' with Railway service '$SERVICE'"
          if [ -f railway.json ]; then
            echo "Using railway.json from $(pwd)/railway.json"
          else
            echo "No railway.json staged; Railway will use the repository root defaults."
          fi

          set +e
          output=$(railway up --ci --service "$SERVICE" 2>&1)
          status=$?
          set -e

          printf '%s\n' "$output"

          if [ "$status" -ne 0 ]; then
            log_url=$(printf '%s\n' "$output" | grep -Eo 'https://railway\.com/project/[^[:space:]]+' | tail -n 1)
            if [ -n "$log_url" ]; then
              echo "Railway build logs: $log_url"
            fi
            exit "$status"
          fi
