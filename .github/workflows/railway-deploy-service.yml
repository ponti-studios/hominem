on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      checkout_ref:
        required: false
        type: string
        default: ''
      config_path:
        required: false
        type: string
        default: ''
    secrets:
      service_target:
        required: true
      RAILWAY_TOKEN:
        required: true

concurrency:
  group: railway-deploy-${{ inputs.service_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SERVICE: ${{ secrets.service_target }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: install-railway-cli
        # Keep reasonably current — older CLI builds have reported false "Deploy failed"
        # after image push without running the healthcheck phase.
        run: npm install -g @railway/cli@5.25.1

      - name: validate-env
        run: |
          test -n "$SERVICE" || {
            echo "Missing Railway service target secret for '${{ inputs.service_name }}'."
            exit 1
          }
          test -n "$RAILWAY_TOKEN" || {
            echo "Missing RAILWAY_TOKEN secret."
            exit 1
          }

      - name: stage-railway-config
        if: inputs.config_path != ''
        run: |
          cp "${{ inputs.config_path }}" railway.json
          echo "Staged railway.json from ${{ inputs.config_path }}:"
          cat railway.json

      - name: deploy-to-railway
        run: |
          echo "Deploying '${{ inputs.service_name }}' with Railway service '$SERVICE'"
          if [ -f railway.json ]; then
            echo "Using railway.json from $(pwd)/railway.json"
          else
            echo "No railway.json staged; Railway will use dashboard / service config."
          fi

          set +e
          # Stream logs so healthcheck progress is visible in Actions.
          railway up --ci --service "$SERVICE" 2>&1 | tee /tmp/railway-up.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            log_url=$(grep -Eo 'https://railway\.com/project/[^[:space:]]+' /tmp/railway-up.log | tail -n 1 || true)
            if [ -n "$log_url" ]; then
              echo "Railway build logs: $log_url"
            fi
            echo "--- last 80 lines of railway up ---"
            tail -n 80 /tmp/railway-up.log || true
            exit "$status"
          fi
