on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      checkout_ref:
        required: false
        type: string
        default: ''
      config_path:
        required: true
        type: string
    secrets:
      service_target:
        required: true
      RAILWAY_TOKEN:
        required: true

concurrency:
  group: railway-deploy-${{ inputs.service_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SERVICE: ${{ secrets.service_target }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: '24.14.1'

      - name: validate-env
        run: |
          test -n "$SERVICE" || {
            echo "Missing Railway service target secret for '${{ inputs.service_name }}'."
            exit 1
          }
          test -n "$RAILWAY_TOKEN" || {
            echo "Missing RAILWAY_TOKEN secret."
            exit 1
          }

      - name: deploy-to-railway
        run: just deploy railway "${{ inputs.service_name }}" "${{ inputs.config_path }}"
