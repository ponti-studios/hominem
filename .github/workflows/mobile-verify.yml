name: Mobile · Configuration Verification

on:
    push:
        branches: [main, develop]
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-verify.yml"
    pull_request:
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-verify.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify-config:
        name: Verify Config
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile
              with:
                  install-eas-cli: "true"

            - name: Verify dev configuration
              run: bun run verify:dev
              working-directory: apps/mobile

            - name: Verify e2e configuration
              run: bun run verify:e2e
              working-directory: apps/mobile

    verify-preview-config:
        name: Verify Preview Config
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile
              with:
                  install-eas-cli: "true"

            - name: Verify preview configuration
              run: bun run verify:preview
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    verify-production-config:
        name: Verify Production Config
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Verify production configuration
              run: bun run verify:production
              working-directory: apps/mobile
              env:
                  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
