name: mobile-store-release

on:
  workflow_dispatch:
    inputs:
      action:
        description: App Store Connect action
        required: true
        type: choice
        options:
          - submit_for_review
          - release

permissions:
  contents: read

jobs:
  store-action:
    name: ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.action == 'release' && 'omiro-production' || 'omiro-testflight' }}
    timeout-minutes: 30

    steps:
      - name: checkout-repository
        uses: actions/checkout@v7

      - name: setup-ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/omiro

      - name: run-store-action
        working-directory: apps/omiro
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          ASC_BUNDLE_ID: com.pontistudios.hakumi
          TESTFLIGHT_GROUP: ${{ vars.TESTFLIGHT_GROUP }}
        run: bundle exec fastlane ios "${{ inputs.action }}"
