name: Mobile · E2E Tests

on:
    push:
        branches: [main, develop]
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-e2e.yml"
    pull_request:
        paths:
            - "apps/mobile/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "bunfig.toml"
            - "turbo.json"
            - "tsconfig.json"
            - "tsconfig.profiles/**"
            - ".github/actions/setup-mobile/**"
            - ".github/workflows/mobile-e2e.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-e2e-app:
        name: Build E2E App
        runs-on: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Build E2E test app
              run: bun run build:e2e
              working-directory: apps/mobile

            - name: Upload E2E app
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-app
                  path: apps/mobile/artifacts
                  retention-days: 1

    e2e-auth:
        name: E2E · Auth Flow
        runs-on: macos-latest
        needs: build-e2e-app
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Download E2E app
              uses: actions/download-artifact@v4
              with:
                  name: e2e-app
                  path: apps/mobile/artifacts

            - name: Run auth E2E tests
              run: bun run test:e2e
              working-directory: apps/mobile
              timeout-minutes: 15

    e2e-deep-links:
        name: E2E · Deep Links
        runs-on: macos-latest
        needs: build-e2e-app
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Download E2E app
              uses: actions/download-artifact@v4
              with:
                  name: e2e-app
                  path: apps/mobile/artifacts

            - name: Run deep links E2E tests
              run: bun run test:e2e:deep-links
              working-directory: apps/mobile
              timeout-minutes: 15

    e2e-smoke:
        name: E2E · Smoke Tests
        runs-on: macos-latest
        needs: build-e2e-app
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup mobile workspace
              uses: ./.github/actions/setup-mobile

            - name: Download E2E app
              uses: actions/download-artifact@v4
              with:
                  name: e2e-app
                  path: apps/mobile/artifacts

            - name: Run smoke E2E tests
              run: bun run test:e2e:smoke
              working-directory: apps/mobile
              timeout-minutes: 15

    e2e-results:
        name: E2E Results
        runs-on: ubuntu-latest
        needs: [e2e-auth, e2e-deep-links, e2e-smoke]
        if: always()
        steps:
            - name: Check E2E status
              run: |
                  if [ "${{ needs.e2e-auth.result }}" != "success" ] || \
                     [ "${{ needs.e2e-deep-links.result }}" != "success" ] || \
                     [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
                    echo "❌ E2E tests failed"
                    exit 1
                  fi
                  echo "✅ All E2E tests passed"
