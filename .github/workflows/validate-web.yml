name: validate-web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.json'
      - 'tsconfig.profiles/**'
      - 'justfile'
      - 'justfiles/**'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-web.yml'
  pull_request:
    branches: [main, preview]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.json'
      - 'tsconfig.profiles/**'
      - 'justfile'
      - 'justfiles/**'
      - '.github/actions/setup-pnpm-workspace/**'
      - '.github/workflows/validate-web.yml'

concurrency:
  group: validate-web-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate-web:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.14.1]

    steps:
      - name: checkout-repository
        uses: actions/checkout@v4

      - name: setup-pnpm-workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          node-version: ${{ matrix.node-version }}

      - name: lint
        run: just lint

      - name: typecheck
        run: just typecheck
