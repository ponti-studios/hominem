name: mobile-production-release

on:
  workflow_dispatch:

concurrency:
  group: mobile-production-release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Submit → TestFlight
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Verify required secrets
        run: |
          missing=()
          [ -z "${{ secrets.EXPO_TOKEN }}" ] && missing+=("EXPO_TOKEN")
          [ -z "${{ secrets.EXPO_APPLE_ID }}" ] && missing+=("EXPO_APPLE_ID")
          [ -z "${{ secrets.EXPO_ASC_APP_ID }}" ] && missing+=("EXPO_ASC_APP_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          install-flags: "--frozen-lockfile"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Typecheck mobile
        run: bunx tsc -p apps/mobile/tsconfig.json --noEmit

      - name: Mobile unit tests
        run: |
          set -o pipefail
          bun run --filter @hominem/mobile test:unit:auth -- --reporter=default --reporter=json --outputFile.json=mobile-auth-unit.vitest.json 2>&1 | tee mobile-auth-unit.log
          {
            echo '### Mobile auth unit test summary'
            echo
            grep -E 'Test Files|Tests |Duration' mobile-auth-unit.log | tail -n 20 || true
            echo
            node scripts/summarize-vitest-report.mjs mobile-auth-unit.vitest.json '### Mobile auth unit slowest tests' 5 250
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          EXPO_PUBLIC_API_BASE_URL: "http://localhost:4040"

      - name: Verify Expo config
        run: bun run --filter @hominem/mobile verify:expo-config
        env:
          APP_VARIANT: production
          EXPO_NO_DOTENV: "1"
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_E2E_TESTING: "false"

      - name: Verify production EAS env
        run: bun run --filter @hominem/mobile verify:eas-env:production

      - name: Build production iOS binary
        working-directory: apps/mobile
        env:
          APP_VARIANT: production
          EXPO_NO_DOTENV: "1"
        run: eas build --profile production --platform ios --non-interactive

      - name: Submit to TestFlight
        working-directory: apps/mobile
        env:
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}
        run: eas submit --profile production --platform ios --non-interactive --latest
