name: mobile-production-release

on:
    workflow_dispatch:

concurrency:
    group: mobile-production-release
    cancel-in-progress: false

jobs:
    release:
        name: Build & Submit → TestFlight
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Verify required secrets
              run: |
                  missing=()
                  [ -z "${{ secrets.EXPO_TOKEN }}" ] && missing+=("EXPO_TOKEN")
                  [ -z "${{ secrets.EXPO_APPLE_ID }}" ] && missing+=("EXPO_APPLE_ID")
                  [ -z "${{ secrets.EXPO_ASC_APP_ID }}" ] && missing+=("EXPO_ASC_APP_ID")
                  if [ ${#missing[@]} -gt 0 ]; then
                    echo "::error::Missing required secrets: ${missing[*]}"
                    exit 1
                  fi

            - uses: actions/checkout@v4

            - uses: ./.github/actions/setup
              with:
                  install-flags: "--frozen-lockfile"

            - name: Setup EAS
              uses: expo/expo-github-action@v8
              with:
                  eas-version: 10.0.3
                  token: ${{ secrets.EXPO_TOKEN }}

            - name: Build production iOS binary
              run: make mobile.release.build.production
              env:
                  EXPO_PUBLIC_API_BASE_URL: "http://localhost:4040"

            - name: Submit to TestFlight
              env:
                  EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
                  EXPO_ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}
              run: make mobile.release.submit.production
