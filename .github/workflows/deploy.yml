name: Deploy

on:
    push:
        branches: [main]
        tags: ["v*"]

concurrency:
    group: deploy-${{ github.event_name }}-${{ github.ref }}
    cancel-in-progress: false

defaults:
    run:
        shell: bash

env:
    REGISTRY: ghcr.io

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        outputs:
            infra-images: ${{ steps.filter.outputs.infra-images }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      infra-images:
                        - 'infra/images/**'
                        - '.github/workflows/deploy.yml'

    # --- Docker images (push to main) ---

    build-docker-images:
        name: Build Docker Images
        runs-on: ubuntu-latest
        needs: changes
        if: needs.changes.outputs.infra-images == 'true'
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository }}/postgres
                  tags: |
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix={{branch}}-
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push PostgreSQL image
              uses: docker/build-push-action@v5
              with:
                  context: infra/images/postgres
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

