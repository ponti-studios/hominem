name: Setup Toolchain
description: Install repository toolchain from .tool-versions.

inputs:
  install-node:
    description: Whether to install Node.js from .tool-versions
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - id: versions
      name: Read tool versions
      shell: bash
      run: |
        bun_version=$(grep '^bun ' .tool-versions | awk '{print $2}')
        just_version=$(grep '^just ' .tool-versions | awk '{print $2}')
        node_version=$(grep '^nodejs ' .tool-versions | awk '{print $2}')

        if [ -z "$bun_version" ] || [ -z "$just_version" ] || [ -z "$node_version" ]; then
          echo "Missing tool in .tool-versions" >&2
          echo "bun_version=$bun_version" >&2
          echo "just_version=$just_version" >&2
          echo "node_version=$node_version" >&2
          exit 1
        fi

        {
          echo "bun_version=$bun_version"
          echo "just_version=$just_version"
          echo "node_version=$node_version"
        } >> "$GITHUB_OUTPUT"

    - name: Install Just
      uses: taiki-e/install-action@v2
      with:
        tool: just@${{ steps.versions.outputs.just_version }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ steps.versions.outputs.bun_version }}

    - name: Setup Node.js
      if: ${{ inputs.install-node == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.versions.outputs.node_version }}

    - name: Cache Bun install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
