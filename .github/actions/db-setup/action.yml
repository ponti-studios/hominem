name: Initialize Database Schema with Atlas
description: Install Atlas CLI and apply database schema to test database

inputs:
  database-url:
    description: PostgreSQL database URL for schema application
    required: true
  dev-database-url:
    description: Development database URL for schema validation (Atlas uses this to compute diffs)
    required: false
    default: sqlite://file?mode=memory&cache=shared
  schema-path:
    description: Path to schema directory containing atlas.yaml (relative to repo root)
    required: false
    default: packages/db

runs:
  using: composite
  steps:
    - name: Install Atlas CLI
      shell: bash
      run: |
        curl -sSf https://atlasgo.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Apply database schema
      shell: bash
      env:
        DATABASE_URL: ${{ inputs.database-url }}
      run: |
        cd "${{ inputs.schema-path }}"
        atlas schema apply \
          --dev-url "${{ inputs.dev-database-url }}" \
          --auto-approve
