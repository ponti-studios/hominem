name: Initialize Database Schema with Goose
description: Apply database migrations via the repository bootstrap command

inputs:
  environment:
    description: Target environment (test or prod)
    required: false
    default: test
  migrations-path:
    description: Path to Goose migrations directory (relative to repo root)
    required: false
    default: packages/core/db/migrations

runs:
  using: composite
  steps:
    - name: Cache Goose binary
      uses: actions/cache@v4
      with:
        path: ~/go/bin/goose
        key: goose-v3.27.0

    - name: Install Goose CLI
      shell: bash
      run: just db-setup "${{ inputs.environment }}" "${{ inputs.migrations-path }}"
