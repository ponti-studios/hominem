name: Setup Environment
description: Install dependencies, build packages, and optionally install Goose CLI

inputs:
  install-flags:
    description: Additional flags for bun install
    required: false
    default: ''
  install-goose:
    description: Whether to install the Goose CLI
    required: false
    default: 'false'
  goose-version:
    description: Goose version to install (e.g. v3.27.0)
    required: false
    default: 'v3.27.0'
  build-packages:
    description: Whether to build packages (needed for packages with build outputs)
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install just
      shell: bash
      run: |
        if ! command -v just &> /dev/null; then
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
        fi
    - name: Install dependencies
      shell: bash
      run: just setup "${{ inputs.install-flags }}" "${{ inputs.build-packages }}" "${{ inputs.install-goose }}"
