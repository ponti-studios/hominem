name: Setup Environment
description: Install dependencies, build packages, and optionally install Goose CLI

inputs:
  install-flags:
    description: Additional flags for bun install
    required: false
    default: ""
  install-goose:
    description: Whether to install the Goose CLI
    required: false
    default: "false"
  goose-version:
    description: Goose version to install (e.g. v3.27.0)
    required: false
    default: "v3.27.0"
  build-packages:
    description: Whether to build packages (needed for packages with build outputs)
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: just setup "${{ inputs.install-flags }}" "${{ inputs.build-packages }}" "${{ inputs.install-goose }}"

    - name: Clear Bun module cache
      if: runner.os == 'Linux'
      shell: bash
      run: |
          if [ -d "node_modules/.bun" ]; then
              echo "Clearing node_modules/.bun to resolve potential module compatibility issues"
              rm -rf node_modules/.bun
          fi
