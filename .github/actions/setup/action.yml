name: Setup Environment
description: Setup Bun, install dependencies, build packages, and optionally install Goose CLI

inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: "1.3.10"
  install-flags:
    description: Additional flags for bun install
    required: false
    default: ""
  install-goose:
    description: Whether to install the Goose CLI
    required: false
    default: "false"
  goose-version:
    description: Goose version to install (e.g. v3.27.0)
    required: false
    default: "v3.27.0"
  build-packages:
    description: Whether to build packages (needed for packages with build outputs)
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install dependencies
      shell: bash
      run: bun install ${{ inputs.install-flags }}

    - name: Build packages
      if: ${{ inputs.build-packages == 'true' }}
      shell: bash
      run: bun turbo run build --filter=@hominem/env --filter=@hominem/db --filter=@hominem/rpc --filter=@hominem/auth

    - name: Install Goose CLI
      if: ${{ inputs.install-goose == 'true' }}
      shell: bash
      run: |
        go install github.com/pressly/goose/v3/cmd/goose@${{ inputs.goose-version }}
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
