name: Start Compose Services
description: Start repository-defined Docker Compose services for CI jobs

inputs:
  compose-files:
    description: Space-separated Compose files relative to the repository root
    required: true
  services:
    description: Space-separated service names to start
    required: true
  project-name:
    description: Docker Compose project name
    required: false
    default: hominem
  wait-timeout:
    description: Time in seconds to wait for healthy services
    required: false
    default: '120'

runs:
  using: composite
  steps:
    - name: Start compose services
      shell: bash
      run: just start-compose-services "${{ inputs.compose-files }}" "${{ inputs.services }}" "${{ inputs.project-name }}" "${{ inputs.wait-timeout }}"
