name: Start Compose Services
description: Start repository-defined Docker Compose services for CI jobs

inputs:
  compose-files:
    description: Space-separated Compose files relative to the repository root
    required: true
  services:
    description: Space-separated service names to start
    required: true
  project-name:
    description: Docker Compose project name
    required: false
    default: hominem
  wait-timeout:
    description: Time in seconds to wait for healthy services
    required: false
    default: '120'

runs:
  using: composite
  steps:
    - name: Start compose services
      shell: bash
      run: |
        set -euo pipefail

        read -r -a compose_files <<< "${{ inputs.compose-files }}"
        read -r -a services <<< "${{ inputs.services }}"

        compose_args=()
        for compose_file in "${compose_files[@]}"; do
          compose_args+=(-f "$GITHUB_WORKSPACE/$compose_file")
        done

        docker compose "${compose_args[@]}" \
          --project-name "${{ inputs.project-name }}" \
          up -d --wait --wait-timeout "${{ inputs.wait-timeout }}" \
          "${services[@]}"
