packages:
  - 'apps/*'
  - 'services/*'
  - 'packages/*'

# Single source of truth for shared dependency versions.
# Reference from package.json with "catalog:" (e.g. "react": "catalog:").
catalog:
  react: 19.2.7
  react-dom: 19.2.7
  '@types/react': 19.2.10
  '@types/react-dom': 19.1.7
  zod: 4.4.3

overrides:
  ua-parser-js: 1.0.39
  prismjs: '>=1.30.0'
  markdown-it: '>=12.3.2'
  serialize-javascript: '>=7.0.3'
  '@xmldom/xmldom': 0.8.13
  fast-xml-parser: '>=5.7.0'
  postcss: '>=8.5.10'
  uuid: '>=11.1.1'
  axios: '>=1.15.1'
  fast-xml-builder: '>=1.1.6'
  kysely: '>=0.28.17'
  '@protobufjs/utf8': '>=1.1.1'
  protobufjs: '>=7.5.6'
  # typescript-eslint needs a newer release to parse against typescript@7.0.2's
  # restructured package.
  '@typescript-eslint/eslint-plugin': 8.64.0
  '@typescript-eslint/parser': 8.64.0
  '@typescript-eslint/project-service': 8.64.0
  '@typescript-eslint/scope-manager': 8.64.0
  '@typescript-eslint/tsconfig-utils': 8.64.0
  '@typescript-eslint/type-utils': 8.64.0
  '@typescript-eslint/types': 8.64.0
  '@typescript-eslint/typescript-estree': 8.64.0
  '@typescript-eslint/utils': 8.64.0
  '@typescript-eslint/visitor-keys': 8.64.0
  # Force every workspace + transitive consumer onto the catalog React.
  react: 'catalog:'
  react-dom: 'catalog:'
  '@types/react': 'catalog:'
  '@types/react-dom': 'catalog:'

nodeVersion: 24.14.1
engineStrict: true
pmOnFail: error
dedupePeerDependents: true
resolvePeersFromWorkspaceRoot: true
injectWorkspacePackages: true
verifyStoreIntegrity: true
strictStorePkgContentCheck: true
minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
trustPolicy: needsFix
blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  '@openrouter/sdk': true
  '@railway/cli': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: false
  dtrace-provider: false
  esbuild: true
  msgpackr-extract: false
  msw: false
  protobufjs: false
  unrs-resolver: true
peerDependencyRules:
  allowedVersions:
    vite: '^8.0.0'
    '@opentelemetry/api': '1.9.1'
    valibot: '1.2.0 || ^1.3.0'
