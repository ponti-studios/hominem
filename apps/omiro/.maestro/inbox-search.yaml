appId: com.pontistudios.hakumi.dev
---
# Covers expand-on-tap search across the Chats/Notes/Tasks contexts. The
# native top toolbar keeps the context picker stable while the right action
# group becomes a focused field with Cancel. Assumes seed data: a task_list titled
# "3 tasks", and a standalone task "Buy groceries" (see tasks-navigation.yaml
# / tasks-edit.yaml for the same fixtures).
- runFlow: startup.yaml

- assertVisible:
    id: workspace-context-chats
- tapOn: Search
- assertVisible:
    id: workspace-search-input
- assertVisible:
    id: workspace-search-cancel
- assertVisible:
    id: workspace-context-chats
- tapOn: Cancel
- assertVisible:
    id: inbox-composer-input
# Switching contexts while search is active re-scopes it instead of closing it.
- tapOn:
    id: workspace-context-tasks
- assertVisible: "3 tasks"
- assertVisible: Buy groceries
- tapOn: Search
- assertVisible:
    id: workspace-search-input
- assertVisible:
    id: workspace-context-chats
- inputText: groceries
- assertVisible: Buy groceries
- assertNotVisible: "3 tasks"
- tapOn:
    id: workspace-search-cancel
- assertVisible: "3 tasks"
