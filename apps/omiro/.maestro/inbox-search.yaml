appId: com.pontistudios.hakumi.dev
---
# Covers the native search bar across the Chats/Notes/Tasks tabs. headerLeft
# is a single, structurally invariant icon toggle — it never changes shape
# between idle and active search, so it stays visible and interactive the
# whole time search is active. Switching tabs mid-search re-scopes the
# query instead of closing it. Assumes seed data: a task_list titled
# "3 tasks", and a standalone task "Buy groceries" (see tasks-navigation.yaml
# / tasks-edit.yaml for the same fixtures).
- runFlow: startup.yaml

- assertVisible:
    id: inbox-tab-control-chats
- tapOn: Search
- assertVisible: Cancel
- assertVisible:
    id: inbox-tab-control-chats
- tapOn: Cancel
- assertVisible:
    id: inbox-composer-input

# Switching tabs while search is active re-scopes it instead of closing it.
- tapOn:
    id: inbox-tab-control-tasks
- assertVisible: "3 tasks"
- assertVisible: Buy groceries
- tapOn: Search
- assertVisible: Cancel
- assertVisible:
    id: inbox-tab-control-chats
- inputText: groceries
- assertVisible: Buy groceries
- assertNotVisible: "3 tasks"
- tapOn: Cancel
- assertVisible: "3 tasks"
