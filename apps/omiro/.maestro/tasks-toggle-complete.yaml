appId: com.pontistudios.hakumi.dev
---
# Assumes seed data: a task_list titled "3 tasks" with a child task
# "Renew passport" that is not yet completed.
- launchApp
- tapOn: Open inbox menu
- tapOn: Tasks
- tapOn: "3 tasks"
- assertVisible:
    text: "Renew passport, mark complete"
- tapOn:
    text: "Renew passport, mark complete"
- assertVisible:
    text: "Renew passport, completed"
- tapOn:
    text: "Renew passport, completed"
- assertVisible:
    text: "Renew passport, mark complete"
