appId: com.pontistudios.hakumi.dev
---
# Drives 15 date-related prompts through the on-device calendar spike
# (settings/on-device-calendar-spike.tsx) and screenshots each response so a
# human or agent can review whether lookupCalendarEvents resolved the right
# startDate/endDate/dayPart. This is an exploratory/diagnostic flow, not a
# pass/fail regression test — responses are free-form on-device model output,
# so there is nothing fixed to assert against. See
# on-device-calendar-date-queries.md in this directory for what "correct" is
# expected to look like per prompt, and how to review the results.
#
# Requires:
#   - a physical device with Apple Intelligence enabled (the simulator
#     cannot run FoundationModels sessions)
#   - calendar permission already granted to the dev build (grant it once
#     manually via the "Request calendar access" button before running this
#     flow — permission prompts are outside Maestro's control on iOS)
#   - EXPO_PUBLIC_ON_DEVICE_AI_SPIKE_ENABLED=true, or a __DEV__ build, so the
#     settings row is visible
- runFlow: startup.yaml
- tapOn: Open inbox menu
- tapOn: Settings
- assertVisible: Settings
- tapOn:
    id: settings-on-device-calendar-spike
- assertVisible:
    id: on-device-calendar-spike-screen

# 1
- tapOn:
    id: on-device-calendar-spike-input
- eraseText: 200
- inputText: What do I have today?
- tapOn:
    id: on-device-calendar-spike-ask-button
- extendedWaitUntil:
    visible:
      id: on-device-calendar-spike-response
    timeout: 45000
- takeScreenshot: 01-what-do-i-have-today

