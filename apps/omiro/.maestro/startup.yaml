appId: com.pontistudios.hakumi.dev
---
# Startup helper that waits for the app to be ready after launch.
# Handles both cold starts (auth/boot screens) and warm launches
# where the inbox is already visible.
- launchApp
# Wait for the inbox to be interactive. The app may briefly show a
# booting indicator before navigating to the inbox or auth screen.
- assertVisible:
    id: protected-bootstrap
    optional: true
- assertVisible:
    id: auth-screen
    optional: true
- extendedWaitUntil:
    visible:
      id: inbox-composer-input
    timeout: 30000
# SegmentedToggle's own container testID (inbox-tab-control) never surfaces
# in the iOS accessibility tree — a plain View wrapping accessible Pressable
# children gets flattened out of it, even though it renders fine. Each
# segment carries its own derived id (inbox-tab-control-<value>); "chats" is
# always present regardless of which tab is active, so it stands in here for
# "the toggle has rendered."
- extendedWaitUntil:
    visible:
      id: inbox-tab-control-chats
    timeout: 15000
