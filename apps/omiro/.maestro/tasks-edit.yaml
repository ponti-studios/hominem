appId: com.pontistudios.hakumi.dev
---
# Assumes seed data: a standalone task titled "Buy groceries" (no children)
# at the top level of the Tasks list. Tapping a standalone task row opens the
# TaskEditorSheet in edit mode. Fields inside the sheet are targeted by
# testID (id:) rather than text — see tasks-create.yaml for why.
- runFlow: startup.yaml
- tapOn: Open inbox menu
- tapOn: Tasks
- assertVisible: Buy groceries
- tapOn: Buy groceries
- assertVisible:
    id: task-editor-title-input
- tapOn:
    id: task-editor-priority-low
- tapOn:
    id: task-editor-due-Today
- tapOn:
    id: task-editor-submit
- assertNotVisible:
    id: task-editor-submit
- assertVisible: Buy groceries
