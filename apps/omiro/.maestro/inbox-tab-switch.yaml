appId: com.pontistudios.hakumi.dev
---
# Switches between the Chats, Notes, and Tasks contexts in the Workspace
# top toolbar. Context changes remain local to the Workspace route.
- runFlow: startup.yaml
- assertVisible:
    id: inbox-composer-input
- assertVisible:
    id: workspace-context-chats
- tapOn:
    id: workspace-context-chats
- assertVisible: Chats
- assertVisible:
    id: inbox-composer-input
- tapOn:
    id: workspace-context-notes
- assertVisible: Notes
- assertVisible:
    id: inbox-composer-input
# Tasks is embedded in this same screen (not a pushed route): the context
# control stays visible and there's no composer dock (Tasks has its own floating
# add/voice buttons instead).
- tapOn:
    id: workspace-context-tasks
- assertVisible:
    id: workspace-context-chats
- assertVisible:
    id: tasks-add-button
- assertNotVisible:
    id: inbox-composer-input
- tapOn:
    id: workspace-context-notes
- assertVisible:
    id: inbox-composer-input
