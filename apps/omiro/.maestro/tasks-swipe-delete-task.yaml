appId: com.pontistudios.hakumi.dev
---
# Assumes seed data: a standalone task titled "Buy groceries" (no children)
# at the top level of the Tasks list.
- runFlow: startup.yaml
- tapOn: Open inbox menu
- tapOn: Tasks
- assertVisible: Buy groceries
- swipe:
    direction: LEFT
    element:
      text: Buy groceries
- tapOn:
    text: "^Delete$"
- assertVisible: Delete task
- tapOn:
    text: "^Delete$"
- assertNotVisible: Buy groceries
