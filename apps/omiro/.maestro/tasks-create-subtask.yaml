appId: com.pontistudios.hakumi.dev
---
# Assumes seed data: a task_list titled "3 tasks" with children
# "Renew passport", "Book dentist appointment",
# "Email Sarah about the project budget".
# Opens the list, taps the toolbar "+" button (targeted by its accessibility
# label "Add subtask"), fills in the task editor sheet, and verifies the
# new subtask appears in the list.
- runFlow: startup.yaml
- tapOn: Open inbox menu
- tapOn: Tasks
- assertVisible: "3 tasks"
- tapOn: "3 tasks"
- assertVisible: Renew passport
- tapOn: Add subtask
- assertVisible:
    id: task-editor-title-input
- tapOn:
    id: task-editor-title-input
- inputText: Book flight tickets
- tapOn:
    id: task-editor-priority-high
- tapOn:
    id: task-editor-due-Next week
- tapOn:
    id: task-editor-submit
- assertNotVisible:
    id: task-editor-submit
- assertVisible: Book flight tickets
