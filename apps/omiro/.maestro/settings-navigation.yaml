appId: com.pontistudios.hakumi.dev
---
# Navigates from the inbox to the Settings screen via the header's profile
# icon button (a direct pressable, not a dropdown menu), then back.
- runFlow: startup.yaml
- tapOn:
    id: inbox-open-settings
- assertVisible: Settings
- tapOn:
    id: BackButton
- assertVisible:
    id: inbox-composer-input
