appId: com.pontistudios.hakumi.dev
---
# Assumes seed data: a task_list titled "3 tasks". Deletes the whole list
# (and its children) via the detail screen's toolbar menu.
- launchApp
- tapOn: Open inbox menu
- tapOn: Tasks
- tapOn: "3 tasks"
- tapOn: Task actions
- assertVisible: Delete list
- tapOn: Delete list
- assertVisible: Delete task list
- tapOn:
    text: "^Delete$"
- assertVisible: Tasks
- assertNotVisible: "3 tasks"
