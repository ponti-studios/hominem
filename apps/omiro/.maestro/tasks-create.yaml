appId: com.pontistudios.hakumi.dev
---
# Creates a standalone task via the "+" button and the TaskEditorSheet.
# Fields inside the sheet are targeted by testID (id:) rather than text —
# tapping by fuzzy text inside the sheet can hit the merged accessibility
# node covering the whole screen and dismiss the sheet via the backdrop.
- runFlow: startup.yaml
- tapOn: Open inbox menu
- tapOn: Tasks
- tapOn: Add task
- assertVisible:
    id: task-editor-title-input
- tapOn:
    id: task-editor-title-input
- inputText: Pick up dry cleaning
- tapOn:
    id: task-editor-priority-high
- tapOn:
    id: task-editor-due-Tomorrow
- tapOn:
    id: task-editor-submit
- assertNotVisible:
    id: task-editor-submit
- assertVisible: Pick up dry cleaning
