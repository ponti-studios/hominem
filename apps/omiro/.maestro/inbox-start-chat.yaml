appId: com.pontistudios.hakumi.dev
---
# Starts a chat from the inbox composer. Typing text and tapping the
# secondary action ("Start a new chat") creates a chat and navigates
# to the chat detail screen.
- runFlow: startup.yaml
- tapOn:
    id: inbox-composer-input
- inputText: Native first smoke chat
- tapOn:
    id: composer-start-chat
- assertVisible: Native first smoke chat
- assertVisible:
    id: chat-composer-input
- tapOn:
    id: BackButton
- assertVisible:
    id: inbox-composer-input
