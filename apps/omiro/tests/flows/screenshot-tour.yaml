appId: com.pontistudios.hakumi.dev
---
# Screenshot tour — captures every major app state.
# Assumes the app is installed and the user is signed in.

# ── 1. Home / Inbox ──────────────────────────────────────────────────────────
- launchApp
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Omiro"
- takeScreenshot: /tmp/omiro_screen_01_inbox

# ── 2. Inbox – search focused ────────────────────────────────────────────────
- tapOn: "Search"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: /tmp/omiro_screen_02_search_focused
# Dismiss by tapping the list area
- tapOn:
    point: "50%, 50%"
- waitForAnimationToEnd:
    timeout: 500

# ── 3. Composer – feed mode (text entered) ───────────────────────────────────
- tapOn:
    id: "feed-composer-input"
- inputText: "Some example note content for the screenshot tour"
- waitForAnimationToEnd:
    timeout: 500
- takeScreenshot: /tmp/omiro_screen_03_composer_feed_text
# Clear and dismiss keyboard
- eraseText: 100
- pressKey: Escape

# ── 4. Settings ───────────────────────────────────────────────────────────────
- tapOn: "gearshape"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/omiro_screen_04_settings

# ── 5. Archived chats (from Settings) ────────────────────────────────────────
- tapOn: "Archived chats"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/omiro_screen_05_archived_chats
- tapOn: "Back"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn: "Back"
- waitForAnimationToEnd:
    timeout: 1000

# ── 6. Note detail ────────────────────────────────────────────────────────────
- tapOn:
    id: "inbox-item-note"
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/omiro_screen_06_note_detail
- tapOn: "Back"
- waitForAnimationToEnd:
    timeout: 1000

# ── 7. Chat detail ────────────────────────────────────────────────────────────
- tapOn:
    id: "inbox-item-chat"
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/omiro_screen_07_chat_detail
- tapOn: "Back"
- waitForAnimationToEnd:
    timeout: 1000
